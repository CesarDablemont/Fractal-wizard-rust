[changelog]
header = """
# Changelog\n
All notable changes to this project will be documented in this file.\n
"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}**({{ commit.scope }}):** {% endif %}\
            {% if commit.breaking %}[BREAKING] {% endif %}\
            {{ commit.message | upper_first }}\
    {% endfor %}
{% endfor %}\n
"""
trim = true
footer = ""

[commit_parser]
filter_unconventional = true
split_commits = false
group_pattern = "^(?<group>[^:]+)"

[git]
conventional_commits = true
filter_unconventional = true
commit_parsers = [
    { message = "^feat", group = "Features", default = true },
    { message = "^fix", group = "Bug Fixes", default = true },
    { message = "^doc", group = "Documentation", default = true },
    { message = "^perf", group = "Performance", default = true },
    { message = "^refactor", group = "Refactor", default = true },
    { message = "^style", group = "Styling", default = true },
    { message = "^test", group = "Testing", default = true },
    { message = "^chore\\(release\\)", skip = true },
    { message = "^chore\\(deps.*\\)", skip = true },
    { message = "^chore\\(pr\\)", skip = true },
    { message = "^chore\\(pull\\)", skip = true },
    { message = "^chore\\(npm\\)|^chore\\(bump\\)", skip = true },
    { message = "^ci", group = "CI/CD", default = true },
    { message = "^build", group = "Build", default = true },
    { body = ".*Security", group = "Security", default = true },
]
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9].*"
